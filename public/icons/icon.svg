<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#0f1419"/>
  <!-- Infinity symbol stylized - two intersecting loops -->
  <g transform="translate(256, 256)">
    <!-- Outer glow circle (accent) -->
    <circle r="160" fill="#2D76FC" opacity="0.15"/>
    <!-- Infinity path: horizontal figure-eight -->
    <path
      d="M -115 0
         C -115 -55, -70 -85, -35 -55
         C -15 -35, 15 35, 35 55
         C 70 85, 115 55, 115 0
         C 115 -55, 70 -85, 35 -55
         C 15 -35, -15 35, -35 55
         C -70 85, -115 55, -115 0
         Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Small accent dot centered -->
    <circle cx="0" cy="0" r="6" fill="#2D76FC"/>
  </g>
</svg>
